<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPSC 2026 — दिन 1 परीक्षण</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Noto+Serif+Devanagari:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #16a34a; --green-light: #dcfce7; --green-dark: #14532d;
  --red: #dc2626; --red-light: #fee2e2; --red-dark: #7f1d1d;
  --orange: #ea580c; --blue: #2563eb;
  --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0;
  --text: #0f172a; --muted: #64748b; --subtle: #f1f5f9;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans Devanagari', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; padding: 0;
}

/* HEADER */
.hero {
  background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #0f172a 100%);
  padding: 32px 20px 28px; text-align: center; position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(37,99,235,0.25) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 50%, rgba(22,163,74,0.2) 0%, transparent 60%);
}
.hero-content { position: relative; z-index: 1; }
.hero-badge {
  display: inline-block; background: rgba(37,99,235,0.25); border: 1px solid rgba(37,99,235,0.5);
  color: #93c5fd; font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; padding: 4px 14px; border-radius: 100px; margin-bottom: 14px;
}
.hero h1 {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 28px; font-weight: 700; color: #ffffff;
  line-height: 1.3; margin-bottom: 8px;
}
.hero p { font-size: 13px; color: #94a3b8; margin-bottom: 20px; }
.hero-stats {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 8px; max-width: 400px; margin: 0 auto;
}
.hs {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 10px 6px; text-align: center;
}
.hs-val { font-size: 20px; font-weight: 700; color: #fff; }
.hs-lbl { font-size: 10px; color: #94a3b8; margin-top: 2px; }
.hs.c .hs-val { color: #4ade80; }
.hs.w .hs-val { color: #f87171; }
.hs.s .hs-val { color: #fbbf24; }

/* PROGRESS */
.progress-wrap { padding: 12px 16px 0; }
.progress-bar {
  height: 5px; background: var(--border); border-radius: 100px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--green), #4ade80);
  border-radius: 100px; transition: width 0.4s ease; width: 0%;
}

/* SCORE BAR */
.score-bar {
  margin: 10px 16px 0;
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: var(--muted);
}
.score-val { font-weight: 600; font-size: 14px; color: var(--text); }

/* SECTION DIVIDER */
.section-divider {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 16px 8px;
}
.sd-line { flex: 1; height: 1px; background: var(--border); }
.sd-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted); white-space: nowrap;
}
.sd-count {
  background: var(--blue); color: #fff;
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px;
}

/* QUESTION CARD */
.q-list { padding: 0 12px 20px; }
.q-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; margin-bottom: 10px;
  transition: box-shadow 0.2s;
}
.q-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
.q-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.q-num {
  min-width: 30px; height: 30px; border-radius: 8px;
  background: var(--subtle); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--muted);
}
.q-num.answered-c { background: var(--green-light); color: var(--green-dark); border-color: var(--green); }
.q-num.answered-w { background: var(--red-light); color: var(--red-dark); border-color: var(--red); }
.q-text { font-size: 14px; font-weight: 500; line-height: 1.6; color: var(--text); flex: 1; }

/* OPTIONS */
.options { display: flex; flex-direction: column; gap: 7px; }
.opt {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 13px; border: 1.5px solid var(--border);
  border-radius: 10px; cursor: pointer; transition: all 0.15s;
  background: var(--bg); font-size: 13px; color: var(--text);
  -webkit-tap-highlight-color: transparent;
}
.opt:hover:not(.disabled) { background: var(--subtle); border-color: #cbd5e1; transform: translateX(2px); }
.opt:active:not(.disabled) { transform: scale(0.99); }
.opt-key {
  min-width: 24px; height: 24px; border-radius: 6px;
  background: var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--muted); flex-shrink: 0;
}
.opt-text { flex: 1; line-height: 1.5; }

/* Answer states */
.opt.correct-answer {
  background: var(--green-light); border-color: var(--green);
  animation: popIn 0.25s ease;
}
.opt.correct-answer .opt-key {
  background: var(--green); color: white;
}
.opt.correct-answer .opt-text { color: var(--green-dark); font-weight: 500; }
.opt.wrong-answer {
  background: var(--red-light); border-color: var(--red);
}
.opt.wrong-answer .opt-key { background: var(--red); color: white; }
.opt.wrong-answer .opt-text { color: var(--red-dark); }
.opt.show-correct {
  background: var(--green-light); border-color: var(--green);
  animation: highlight 0.4s ease;
}
.opt.show-correct .opt-key { background: var(--green); color: white; }
.opt.show-correct .opt-text { color: var(--green-dark); font-weight: 500; }
.opt.disabled { cursor: default; }
.opt.disabled:not(.correct-answer):not(.wrong-answer):not(.show-correct) {
  opacity: 0.5;
}

@keyframes popIn {
  0% { transform: scale(0.97); }
  60% { transform: scale(1.02); }
  100% { transform: scale(1); }
}
@keyframes highlight {
  0% { background: white; }
  50% { background: #bbf7d0; }
  100% { background: var(--green-light); }
}

/* FEEDBACK */
.feedback {
  margin-top: 10px; padding: 10px 13px;
  border-radius: 9px; font-size: 12.5px; line-height: 1.6;
  display: none;
}
.feedback.show { display: block; animation: fadeIn 0.2s ease; }
.feedback.correct {
  background: #f0fdf4; border-left: 3px solid var(--green); color: #166534;
}
.feedback.wrong {
  background: #fff8f0; border-left: 3px solid var(--orange); color: #7c2d12;
}
.feedback strong { font-weight: 700; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

/* RESULT */
.result-screen {
  display: none; padding: 24px 16px;
}
.result-screen.show { display: block; }
.result-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
}
.result-header {
  background: linear-gradient(135deg, #0f172a, #1e3a5f);
  padding: 28px 20px; text-align: center;
}
.result-emoji { font-size: 48px; margin-bottom: 8px; }
.result-score { font-size: 52px; font-weight: 800; margin-bottom: 4px; }
.result-label { font-size: 14px; color: #94a3b8; }
.result-body { padding: 20px; }
.result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.rg-item { padding: 12px 8px; border-radius: 10px; text-align: center; }
.rg-val { font-size: 22px; font-weight: 700; }
.rg-lbl { font-size: 11px; margin-top: 3px; }
.rg-item.c { background: var(--green-light); color: var(--green-dark); }
.rg-item.w { background: var(--red-light); color: var(--red-dark); }
.rg-item.s { background: var(--subtle); color: var(--muted); }
.result-msg {
  background: var(--subtle); border-radius: 10px; padding: 12px 14px;
  font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 14px;
}
.btn {
  width: 100%; padding: 13px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  font-family: 'Noto Sans Devanagari', sans-serif;
}
.btn-primary { background: var(--text); color: white; }
.btn-primary:hover { background: #1e293b; }
.btn-secondary { background: var(--subtle); color: var(--text); border: 1px solid var(--border); margin-top: 8px; }
.btn-secondary:hover { background: var(--border); }

/* STICKY BOTTOM NAV */
.bottom-nav {
  position: sticky; bottom: 0; background: var(--card);
  border-top: 1px solid var(--border); padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: var(--muted); z-index: 10;
}
.bn-score { font-weight: 700; font-size: 14px; color: var(--text); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-content">
    <div class="hero-badge">BPSC 2026 — दिन 1</div>
    <h1>आज का परीक्षण</h1>
    <p>6वीं इतिहास + 8वीं राजनीति &nbsp;|&nbsp; 30 प्रश्न &nbsp;|&nbsp; नकारात्मक अंक: ⅓</p>
    <div class="hero-stats">
      <div class="hs"><div class="hs-val">30</div><div class="hs-lbl">प्रश्न</div></div>
      <div class="hs c"><div class="hs-val" id="hs-c">0</div><div class="hs-lbl">सही</div></div>
      <div class="hs w"><div class="hs-val" id="hs-w">0</div><div class="hs-lbl">गलत</div></div>
      <div class="hs s"><div class="hs-val" id="hs-s">30</div><div class="hs-lbl">बचे</div></div>
    </div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
</div>
<div class="score-bar">
  <span>अंक:</span>
  <span class="score-val" id="score-val">0.00</span>
  <span style="margin-left:auto;font-size:11px;" id="done-count">0 / 30 उत्तर दिए</span>
</div>

<div id="quiz-area"></div>

<div class="result-screen" id="result-screen">
  <div class="result-card">
    <div class="result-header">
      <div class="result-emoji" id="r-emoji">🎯</div>
      <div class="result-score" id="r-score" style="color:#4ade80">0</div>
      <div class="result-label" id="r-label">अंक / 30</div>
    </div>
    <div class="result-body">
      <div class="result-grid">
        <div class="rg-item c"><div class="rg-val" id="r-c">0</div><div class="rg-lbl">सही ✓</div></div>
        <div class="rg-item w"><div class="rg-val" id="r-w">0</div><div class="rg-lbl">गलत ✗</div></div>
        <div class="rg-item s"><div class="rg-val" id="r-s">0</div><div class="rg-lbl">नहीं दिए</div></div>
      </div>
      <div class="result-msg" id="r-msg"></div>
      <button class="btn btn-primary" onclick="resetQuiz()">🔄 दोबारा दें</button>
      <button class="btn btn-secondary" onclick="reviewAnswers()">📋 उत्तर देखें</button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <span id="bn-left" style="color:var(--muted);font-size:12px">जवाब दें और आगे बढ़ें...</span>
  <span class="bn-score" id="bn-score">0.00 अंक</span>
</div>

<script>
const questions = [
  {s:"6वीं इतिहास",q:"सिंधु घाटी सभ्यता की खोज किस वर्ष हुई?",o:["1911","1921","1931","1941"],a:1,e:"1921 में दयाराम साहनी ने हड़प्पा की खोज की थी।"},
  {s:"6वीं इतिहास",q:"मोहनजोदड़ो की खोज किसने की थी?",o:["दयाराम साहनी","जॉन मार्शल","राखलदास बनर्जी","मार्टिमर व्हीलर"],a:2,e:"1922 में राखलदास बनर्जी ने मोहनजोदड़ो की खोज की थी।"},
  {s:"6वीं इतिहास",q:"सिंधु घाटी सभ्यता का पहला बंदरगाह नगर कौन सा था?",o:["हड़प्पा","मोहनजोदड़ो","लोथल","कालीबंगा"],a:2,e:"लोथल (गुजरात) सिंधु घाटी का पहला बंदरगाह नगर था जहाँ गोदीबाड़ा (Dockyard) मिला।"},
  {s:"6वीं इतिहास",q:"'विशाल स्नानागार' कहाँ मिला?",o:["हड़प्पा","लोथल","धोलावीरा","मोहनजोदड़ो"],a:3,e:"विशाल स्नानागार मोहनजोदड़ो में मिला — यह धार्मिक शुद्धिकरण के लिए प्रयुक्त होता था।"},
  {s:"6वीं इतिहास",q:"सिंधु घाटी की लिपि के बारे में सही कथन कौन सा है?",o:["बाएं से दाएं लिखी जाती थी","ऊपर से नीचे लिखी जाती थी","दाएं से बाएं, अभी तक पढ़ी नहीं गई","संस्कृत में लिखी जाती थी"],a:2,e:"सिंधु लिपि दाएं से बाएं लिखी जाती थी और अभी तक पूरी तरह पढ़ी नहीं जा सकी है।"},
  {s:"6वीं इतिहास",q:"सिंधु घाटी सभ्यता में क्या नहीं मिला?",o:["कांस्य नर्तकी","पशुपति मुहर","लोहे के औज़ार","अनाज भंडार"],a:2,e:"सिंधु घाटी सभ्यता कांस्य युग की थी — यहाँ लोहे का उपयोग नहीं होता था।"},
  {s:"6वीं इतिहास",q:"'पशुपति मुहर' किस सभ्यता से संबंधित है?",o:["वैदिक सभ्यता","सिंधु घाटी सभ्यता","मौर्य काल","गुप्त काल"],a:1,e:"पशुपति मुहर मोहनजोदड़ो से मिली — इसमें चारों तरफ जानवरों से घिरे एक देवता हैं।"},
  {s:"6वीं इतिहास",q:"सबसे प्राचीन और महत्वपूर्ण वेद कौन सा है?",o:["सामवेद","यजुर्वेद","अथर्ववेद","ऋग्वेद"],a:3,e:"ऋग्वेद सबसे प्राचीन वेद है — इसमें 1028 सूक्त और 10,462 मंत्र हैं।"},
  {s:"6वीं इतिहास",q:"महाजनपद काल में कुल कितने महाजनपद थे?",o:["12","14","16","18"],a:2,e:"छठी शताब्दी ईपू में 16 महाजनपद थे — मगध उनमें सबसे शक्तिशाली था।"},
  {s:"6वीं इतिहास",q:"मगध साम्राज्य की प्रथम राजधानी कौन सी थी?",o:["पाटलिपुत्र","राजगृह (राजगीर)","वैशाली","तक्षशिला"],a:1,e:"मगध की पहली राजधानी राजगृह थी — बाद में उदयिन ने पाटलिपुत्र को राजधानी बनाया।"},
  {s:"6वीं इतिहास",q:"गौतम बुद्ध का जन्म कहाँ हुआ था?",o:["बोधगया","सारनाथ","लुंबिनी","कुशीनगर"],a:2,e:"गौतम बुद्ध का जन्म लुंबिनी (वर्तमान नेपाल) में लगभग 563 ईपू में हुआ था।"},
  {s:"6वीं इतिहास",q:"गौतम बुद्ध को ज्ञान की प्राप्ति कहाँ हुई?",o:["सारनाथ","लुंबिनी","बोधगया","कुशीनगर"],a:2,e:"बोधगया (बिहार) में पीपल वृक्ष के नीचे 35 वर्ष की आयु में बुद्ध को ज्ञान मिला।"},
  {s:"6वीं इतिहास",q:"जैन धर्म के 24वें और अंतिम तीर्थंकर कौन थे?",o:["पार्श्वनाथ","ऋषभदेव","महावीर स्वामी","नेमिनाथ"],a:2,e:"महावीर स्वामी (599-527 ईपू) जैन धर्म के 24वें और अंतिम तीर्थंकर थे।"},
  {s:"6वीं इतिहास",q:"अशोक किस वंश का सम्राट था?",o:["गुप्त वंश","मौर्य वंश","कुषाण वंश","शुंग वंश"],a:1,e:"अशोक मौर्य वंश का तीसरा और सबसे महान सम्राट था — चंद्रगुप्त मौर्य का पोता।"},
  {s:"6वीं इतिहास",q:"अशोक ने बौद्ध धर्म किस युद्ध के बाद अपनाया?",o:["हाइडेस्पीज़ युद्ध","कलिंग युद्ध","पानीपत युद्ध","तराइन युद्ध"],a:1,e:"261 ईपू में कलिंग युद्ध में लाखों लोगों की मृत्यु से व्याकुल होकर अशोक ने बौद्ध धर्म अपनाया।"},
  {s:"6वीं इतिहास",q:"अशोक के शिलालेख मुख्यतः किस लिपि में थे?",o:["देवनागरी","संस्कृत","ब्राह्मी","खरोष्ठी"],a:2,e:"अधिकांश शिलालेख ब्राह्मी लिपि में हैं — उत्तर-पश्चिम के कुछ शिलालेख खरोष्ठी में हैं।"},
  {s:"6वीं इतिहास",q:"'धम्म' शब्द किस भाषा का है?",o:["संस्कृत","पाली","तमिल","प्राकृत"],a:1,e:"धम्म पाली भाषा का शब्द है — संस्कृत में इसे 'धर्म' कहते हैं। अशोक ने पाली में शिलालेख लिखवाए।"},
  {s:"6वीं इतिहास",q:"सिंधु घाटी सभ्यता के लोग किस धातु का उपयोग नहीं करते थे?",o:["सोना","चांदी","लोहा","तांबा"],a:2,e:"यह कांस्य युग की सभ्यता थी — लोहे की खोज बाद में हुई।"},
  {s:"6वीं इतिहास",q:"कालीबंगा (राजस्थान) में किसके साक्ष्य मिले?",o:["विशाल स्नानागार","जुते हुए खेत","पहला बंदरगाह","कांस्य नर्तकी"],a:1,e:"कालीबंगा में जुते हुए खेत के साक्ष्य मिले — यह विश्व की सबसे पुरानी कृषि का प्रमाण है।"},
  {s:"6वीं इतिहास",q:"वैदिक काल में वर्ण व्यवस्था का मूल आधार क्या था?",o:["जन्म","कर्म (पेशा)","धन","भूमि"],a:1,e:"प्रारंभिक वैदिक काल में वर्ण कर्म पर आधारित था — बाद के काल में यह जन्म पर आधारित हो गया।"},
  {s:"8वीं राजनीति",q:"भारतीय संविधान कब लागू हुआ?",o:["15 अगस्त 1947","26 जनवरी 1950","26 नवंबर 1949","2 अक्टूबर 1950"],a:1,e:"26 जनवरी 1950 को संविधान लागू हुआ — इसीलिए इस दिन गणतंत्र दिवस मनाते हैं।"},
  {s:"8वीं राजनीति",q:"प्रस्तावना में भारत को क्या कहा गया है?",o:["लोकतांत्रिक गणराज्य","संप्रभु, समाजवादी, धर्मनिरपेक्ष, लोकतांत्रिक गणराज्य","संघीय लोकतंत्र","संसदीय गणराज्य"],a:1,e:"42वें संशोधन (1976) से 'समाजवादी' और 'धर्मनिरपेक्ष' शब्द प्रस्तावना में जोड़े गए।"},
  {s:"8वीं राजनीति",q:"संविधान सभा के अध्यक्ष कौन थे?",o:["जवाहरलाल नेहरू","सरदार पटेल","डॉ. राजेंद्र प्रसाद","डॉ. B.R. अंबेडकर"],a:2,e:"डॉ. राजेंद्र प्रसाद संविधान सभा के अध्यक्ष थे। डॉ. अंबेडकर प्रारूप समिति के अध्यक्ष थे।"},
  {s:"8वीं राजनीति",q:"भारत में 'धर्मनिरपेक्षता' का अर्थ क्या है?",o:["सभी धर्म समान, राज्य का कोई धर्म नहीं","हिंदू धर्म राजधर्म है","धर्म पर प्रतिबंध","केवल बहुसंख्यक धर्म को मान्यता"],a:0,e:"भारतीय धर्मनिरपेक्षता का अर्थ है — राज्य का कोई अपना धर्म नहीं, सभी धर्मों को समान सम्मान।"},
  {s:"8वीं राजनीति",q:"संसद के कितने सदन हैं?",o:["एक","दो","तीन","चार"],a:1,e:"भारतीय संसद के दो सदन हैं — लोकसभा (निचला सदन) और राज्यसभा (ऊपरी सदन)।"},
  {s:"8वीं राजनीति",q:"लोकसभा में कितने निर्वाचित सदस्य होते हैं?",o:["442","543","552","545"],a:1,e:"लोकसभा में 543 निर्वाचित सदस्य होते हैं — ये 543 निर्वाचन क्षेत्रों से चुने जाते हैं।"},
  {s:"8वीं राजनीति",q:"कानून बनाने का अधिकार किसे है?",o:["राष्ट्रपति","प्रधानमंत्री","संसद","सुप्रीम कोर्ट"],a:2,e:"संसद को कानून बनाने का अधिकार है — राष्ट्रपति की स्वीकृति के बाद विधेयक कानून बनता है।"},
  {s:"8वीं राजनीति",q:"मौलिक अधिकार संविधान के किस भाग में हैं?",o:["भाग 2","भाग 3","भाग 4","भाग 5"],a:1,e:"मौलिक अधिकार संविधान के भाग 3 में हैं — अनुच्छेद 12 से 35 तक।"},
  {s:"8वीं राजनीति",q:"संविधान का 'संरक्षक' किसे कहा जाता है?",o:["राष्ट्रपति","प्रधानमंत्री","सर्वोच्च न्यायालय","संसद"],a:2,e:"सर्वोच्च न्यायालय संविधान का संरक्षक है — यह संविधान की अंतिम व्याख्या करता है।"},
  {s:"8वीं राजनीति",q:"भारतीय संविधान के निर्माण में कितना समय लगा?",o:["1 वर्ष","2 वर्ष 11 माह 18 दिन","3 वर्ष 6 माह","4 वर्ष"],a:1,e:"9 दिसंबर 1946 से 26 नवंबर 1949 तक — संविधान बनाने में 2 वर्ष 11 माह 18 दिन लगे।"}
];

const state = { answers: Array(30).fill(null), reviewing: false };

function getScore() {
  let c = 0, w = 0;
  state.answers.forEach(a => { if (!a) return; if (a.correct) c++; else w++; });
  return { c, w, score: (c - w/3).toFixed(2) };
}

function updateHeader() {
  const { c, w, score } = getScore();
  const done = state.answers.filter(Boolean).length;
  document.getElementById('hs-c').textContent = c;
  document.getElementById('hs-w').textContent = w;
  document.getElementById('hs-s').textContent = 30 - done;
  document.getElementById('prog').style.width = (done/30*100) + '%';
  document.getElementById('score-val').textContent = score;
  document.getElementById('done-count').textContent = done + ' / 30 उत्तर दिए';
  document.getElementById('bn-score').textContent = score + ' अंक';
  const left = 30 - done;
  document.getElementById('bn-left').textContent = left > 0 ? left + ' प्रश्न बचे' : 'सभी उत्तर दिए!';
}

function choose(qi, oi) {
  if (state.answers[qi] !== null) return;
  const correct = oi === questions[qi].a;
  state.answers[qi] = { chosen: oi, correct };

  const card = document.getElementById('c' + qi);
  const opts = card.querySelectorAll('.opt');
  opts.forEach((o, i) => {
    o.classList.add('disabled');
    if (i !== questions[qi].a && i !== oi) { /* fade */ }
    if (i === questions[qi].a) o.classList.add(correct && i === oi ? 'correct-answer' : 'show-correct');
  });
  if (!correct) opts[oi].classList.add('wrong-answer');

  const numEl = card.querySelector('.q-num');
  numEl.classList.add(correct ? 'answered-c' : 'answered-w');
  numEl.textContent = correct ? '✓' : '✗';

  const fb = card.querySelector('.feedback');
  fb.className = 'feedback show ' + (correct ? 'correct' : 'wrong');
  fb.innerHTML = correct
    ? '<strong>सही!</strong> ' + questions[qi].e
    : '<strong>गलत।</strong> सही उत्तर: <strong>' + ['A','B','C','D'][questions[qi].a] + ') ' + questions[qi].o[questions[qi].a] + '</strong><br>' + questions[qi].e;

  updateHeader();

  const done = state.answers.filter(Boolean).length;
  if (done === 30) setTimeout(showResult, 600);
}

function showResult() {
  const { c, w, score } = getScore();
  const pct = Math.round(c / 30 * 100);
  document.getElementById('r-c').textContent = c;
  document.getElementById('r-w').textContent = w;
  document.getElementById('r-s').textContent = 30 - c - w;
  document.getElementById('r-score').textContent = score;
  document.getElementById('r-score').style.color = pct >= 60 ? '#4ade80' : '#f87171';
  document.getElementById('r-label').textContent = 'अंक / 30 (सही: ' + c + ')';
  const msgs = [
    [80, '🏆', 'शानदार! आप बहुत अच्छी तैयारी कर रहे हैं। इसी तरह आगे बढ़ते रहें!'],
    [60, '👍', 'अच्छा प्रदर्शन! थोड़ा और revision करें — आप target तक पहुँचेंगे।'],
    [40, '📖', 'ठीक है। जो गलत हुए उन्हें दोबारा पढ़ें और फिर से test दें।'],
    [0,  '💪', 'हिम्मत रखें! NCERT दोबारा पढ़ें, Notes बनाएं और कल फिर देखें।'],
  ];
  const [,emoji, msg] = msgs.find(([min]) => pct >= min);
  document.getElementById('r-emoji').textContent = emoji;
  document.getElementById('r-msg').textContent = msg;
  document.getElementById('result-screen').classList.add('show');
  document.getElementById('result-screen').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
  state.answers = Array(30).fill(null);
  state.reviewing = false;
  document.getElementById('result-screen').classList.remove('show');
  render();
  updateHeader();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function reviewAnswers() {
  document.getElementById('result-screen').classList.remove('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  let html = '';
  let lastS = '';
  questions.forEach((q, i) => {
    if (q.s !== lastS) {
      html += `<div class="section-divider">
        <div class="sd-line"></div>
        <div class="sd-label">${q.s}</div>
        <div class="sd-count">${q.s === '6वीं इतिहास' ? 'प्र. 1–20' : 'प्र. 21–30'}</div>
        <div class="sd-line"></div>
      </div>`;
      lastS = q.s;
    }
    const ans = state.answers[i];
    html += `<div class="q-list"><div class="q-card" id="c${i}">
      <div class="q-header">
        <div class="q-num ${ans ? (ans.correct ? 'answered-c' : 'answered-w') : ''}">${ans ? (ans.correct ? '✓' : '✗') : i+1}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="options">`;
    q.o.forEach((o, oi) => {
      let cls = 'opt';
      if (ans) {
        cls += ' disabled';
        if (oi === q.a) cls += ans.correct && ans.chosen === oi ? ' correct-answer' : ' show-correct';
        if (ans.chosen === oi && !ans.correct) cls += ' wrong-answer';
      }
      html += `<div class="${cls}" onclick="choose(${i},${oi})">
        <div class="opt-key">${['A','B','C','D'][oi]}</div>
        <div class="opt-text">${o}</div>
      </div>`;
    });
    const fb = ans
      ? `<div class="feedback show ${ans.correct ? 'correct' : 'wrong'}">${ans.correct ? '<strong>सही!</strong> ' + q.e : '<strong>गलत।</strong> सही: <strong>' + ['A','B','C','D'][q.a] + ') ' + q.o[q.a] + '</strong><br>' + q.e}</div>`
      : '<div class="feedback"></div>';
    html += `</div>${fb}</div></div>`;
  });
  document.getElementById('quiz-area').innerHTML = html;
}

render();
updateHeader();
</script>
</body>
</html>
